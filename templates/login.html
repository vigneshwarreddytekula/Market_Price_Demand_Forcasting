<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer Marketplace - Login</title>
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">
    
    <div class="glass-panel login-panel">
        <div class="logo">🌾 Farmer Market</div>
        <h2>Welcome Back</h2>
        <p class="subtitle">Enter your credentials to access the AI dashboard.</p>
        
        {% if error %}
            <div class="alert error-alert">{{ error }}</div>
        {% endif %}
        {% if success %}
            <div class="alert success-alert">{{ success }}</div>
        {% endif %}
        
        <form action="{{ url_for('login') }}" method="POST">
            <div class="input-group">
                <label for="username">User ID (Username)</label>
                <input type="text" id="username" name="username" placeholder="enter your username" required autocomplete="off">
            </div>
            
            <div class="input-group">
                <label for="password">Security Pin (Password)</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn primary-btn">Secure Login</button>
        </form>

        <hr style="margin: 18px 0; opacity: 0.25;">

        <h3 style="margin: 0 0 8px;">New user? Register</h3>
        <form action="{{ url_for('register') }}" method="POST">
            <div class="input-group">
                <label for="reg-username">Choose Username</label>
                <input type="text" id="reg-username" name="username" placeholder="new username" required autocomplete="off">
            </div>

            <div class="input-group">
                <label for="reg-password">Choose Password</label>
                <input type="password" id="reg-password" name="password" placeholder="••••••••" required>
            </div>

            <div class="input-group">
                <label for="reg-role">Register as</label>
                <select id="reg-role" name="role" required>
                    <option value="">Select role</option>
                    <option value="farmer">Farmer</option>
                    <option value="buyer">Buyer</option>
                </select>
            </div>

            <button type="submit" class="btn primary-btn">Create Account</button>
        </form>
    </div>

</body>
</html>
